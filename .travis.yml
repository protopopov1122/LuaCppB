language: cpp
compiler: gcc
dist: xenial

before_install:
  - sudo apt update
  - sudo apt install -y software-properties-common
  - sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test
  - sudo apt update

install:
  - sudo apt install -y g++-8 python3 python3-setuptools python3-pip ninja-build wget cmake pkg-config
  - sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-8 90
  - sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-8 90
  - pip3 install meson
  - cd tests/unit
  - wget https://github.com/catchorg/Catch2/releases/download/v2.5.0/catch.hpp
  - cd ../../lua-source
  - wget https://www.lua.org/ftp/lua-5.3.5.tar.gz
  - tar xvf lua-5.3.5.tar.gz
  - rm *.tar.gz
  - cd ..

before_script:
  - mkdir bin
  - cd bin
  - meson .. -Dsystem_lua=false -Dcustom_lua_version=5.3.5

script:
  - ninja
  - ./tests/unit/lcppbunit 